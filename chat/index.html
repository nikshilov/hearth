<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f10" />
    <title>hearth</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-brand">
        <heart-pulse></heart-pulse>
        <h1 class="app-title">hearth</h1>
        <span class="app-tag" data-mode-tag>картограф</span>
      </div>
      <div class="app-status" aria-live="polite">
        <span class="status-dot" data-status="ok" title="Pulse engine"></span>
        <span class="status-dot" data-status="ok" title="LLM"></span>
      </div>
    </header>

    <main class="app-main">
      <section class="chat-pane" aria-label="Chat">
        <chat-thread></chat-thread>
        <composer-bar></composer-bar>
      </section>

      <aside class="side-pane" aria-label="Map, state, and router log">
        <profile-snapshot></profile-snapshot>
        <state-panel></state-panel>
        <router-log></router-log>
      </aside>
    </main>

    <script type="module" src="/dist/app.js"></script>
  </body>
</html>
