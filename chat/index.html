<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a0f0c" />
    <title>hearth</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="hearth-corner" aria-hidden="true">
      <heart-pulse></heart-pulse>
      <button type="button" class="settings-gear" aria-label="Settings" title="Settings (Cmd+,)">⚙</button>
    </header>

    <settings-panel></settings-panel>

    <main class="hearth-main">
      <chat-thread></chat-thread>
      <composer-bar></composer-bar>
    </main>

    <aside class="debug-pane" aria-label="Debug — only when ?debug=1">
      <profile-snapshot></profile-snapshot>
      <state-panel></state-panel>
      <router-log></router-log>
    </aside>

    <script type="module" src="/dist/app.js"></script>
  </body>
</html>
